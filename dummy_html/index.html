<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="description" content="An app for tracking employees">
  <meta name="keywords" content="HTML5, tracking">
  <title>Tracking app</title>
  <script src="xlu-include-file.js"></script>
  <link rel="stylesheet" type="text/css" href="/dummy_html/styles/default.css">
  <link rel="stylesheet" type="text/css" href="/dummy_html/styles/main_dashboard.css">
</head>
<body>
<div id="wrapper">
  <header id="main_header" xlu-include-file="templates/header.html">
  </header>
  <main>

    <!-- LEFT: Workers Panel -->
    <aside id="workers-panel">

      <!-- Search -->
      <search>
        <input type="search" placeholder="Value" />
        <button type="submit" aria-label="Search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </search>

      <!-- Worker List -->
      <section id="worker-list">

        <article class="worker-row">
          <h3>Lorem Ipsum</h3>
          <mark class="status active" aria-label="Active">&#10003;</mark>
          <button class="expand" aria-label="Expand">&#9660;</button>
        </article>

        <article class="worker-row">
          <h3>Lorem Ipsum</h3>
          <mark class="status inactive" aria-label="Inactive">&#10007;</mark>
          <button class="expand" aria-label="Expand">&#9660;</button>
        </article>

        <article class="worker-row">
          <h3>Lorem Ipsum</h3>
          <mark class="status active" aria-label="Active">&#10003;</mark>
          <button class="expand" aria-label="Expand">&#9660;</button>
        </article>

        <article class="worker-row">
          <h3>Lorem Ipsum</h3>
          <mark class="status active" aria-label="Active">&#10003;</mark>
          <button class="expand" aria-label="Expand">&#9660;</button>
        </article>

      </section>

    </aside>

    <!-- RIGHT: Map -->
    <section id="map-panel">
      <figure>
        <figcaption>Map</figcaption>
      </figure>
    </section>

  </main>
    <footer id="main_footer">
      <div id="copyright"> Copyright &copy; 2026 </div>
      <button type="button">Button</button>
    </footer>
</div>
<script>

  xLuIncludeFile();

</script>

</body>
</html>
