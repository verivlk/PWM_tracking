<div class="team-wrapper" [class.open]="statusOk" [class.active]="active">
    <article class="team-row">
      <h3>{{ teamData.name }}</h3>
      <mark class="status" [class.active]="statusOk">
        ●
      </mark>
      <button
        class="btn btn-sm btn-primary"
        (click)="teamDetail()">
        Detail
      </button>
    </article>
</div>
