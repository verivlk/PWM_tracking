<div class="input-group">
  <label *ngIf="label">{{ label }}</label>

  <div class="input-wrapper" style="position: relative;">
    <!-- Se è una password E l'utente ha cliccato mostra, diventa text, altrimenti usa il tipo originale -->
    <input
      [type]="type === 'password' && isPasswordVisible ? 'text' : type"
      [placeholder]="placeholder"
      [formControl]="control"
      [class.invalid]="control.invalid && control.touched"
      style="width: 100%; padding-right: 40px;"
    >

    <!-- Mostra il bottone SOLO se questo input era originariamente di tipo 'password' -->
    <button
      *ngIf="type === 'password'"
      type="button"
      (click)="togglePassword()"
      class="toggle-pwd-btn"
      style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;">

      <!-- Icona Occhio Aperto (Mostra) -->
      <svg *ngIf="!isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #666;">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>

      <!-- Icona Occhio Sbarrato (Nascondi) -->
      <svg *ngIf="isPasswordVisible" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #666;">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>

    </button>
  </div>

  <!-- Messaggi di errore -->
  <div *ngIf="control.invalid && control.touched" class="error-msg">
    Campo non valido
  </div>
</div>
