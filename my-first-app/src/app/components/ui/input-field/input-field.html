<div class="input-group">
  <label>{{ label }}</label>
  <input 
    [type]="type" 
    [placeholder]="placeholder" 
    [formControl]="control"
    [class.invalid]="control?.invalid && control?.touched">
  
  <div *ngIf="control?.invalid && control?.touched" class="error-msg">
    This field is required or invalid.
  </div>
</div>
