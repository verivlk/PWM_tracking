<div id="dashboard-layout">
  <aside id="workers-panel">
    <div class="search-wrapper">
      <app-search-bar (searchChange)="onSearch($event)"></app-search-bar>
    </div>

    <div class="worker-list">
      <div *ngFor="let team of filteredTeams" class="worker-wrapper">
        
        <div (click)="toggleDetails(team)" class="team-header">
          <app-worker-row [workerData]="{ name: team.name, status: 'active' }"></app-worker-row>
        </div>

        <div class="details-content" *ngIf="team.isExpanded">
          <p><strong>Project:</strong> {{ team.project || 'No Project' }}</p>
          <p class="members-title">Team:</p>
          <ul>
            <li *ngFor="let m of team.resolvedMembers">
              <span class="member-dot">•</span> 
              {{ m?.name || 'Uknown worker (' + m?.id + ')' }}
            </li>
          </ul>
        </div>

      </div>
    </div>
  </aside>

  <section id="map-container">
    <app-map-view></app-map-view>
  </section>
</div>
