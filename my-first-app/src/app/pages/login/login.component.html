<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>

    <div *ngIf="errorMessage" style="color: #d32f2f; background-color: #ffebee; padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: center; font-size: 0.9rem;">
      {{ errorMessage }}
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <app-input-field
        label="Email"
        type="email"
        placeholder="Enter email"
        [control]="getEmailControl()"
        errorMsg="Valid email is required.">
      </app-input-field>

      <app-input-field
        label="Password"
        type="password"
        placeholder="Enter password"
        [control]="getPasswordControl()"
        errorMsg="Password is required (min 6 chars).">
      </app-input-field>

      <button type="submit" class="btn" [disabled]="loginForm.invalid">
        Submit
      </button>
    </form>
  </div>
</div>
